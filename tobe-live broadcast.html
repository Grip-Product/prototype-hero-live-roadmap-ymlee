<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grip 비즈니스 - 한정판매 라이브</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>

body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f4f6; }
input:focus { outline: none; }
.scrollbar-hide::-webkit-scrollbar { display: none; }
.scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef } = React;

/* ── 인라인 SVG 아이콘 ── */
const IC = { X:`<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>`, Heart:`<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>`, Share2:`<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>`, Gift:`<polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>`, ShoppingBag:`<path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>`, Plus:`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`, Minus:`<line x1="5" y1="12" x2="19" y2="12"/>`, Ticket:`<path d="M15 5v2"/><path d="M15 11v2"/><path d="M15 17v2"/><path d="M5 5h14a2 2 0 0 1 2 2v3a2 2 0 0 0 0 4v3a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-3a2 2 0 0 0 0-4V7a2 2 0 0 1 2-2z"/>`, RotateCw:`<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>`, MoreVertical:`<circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/>`, Maximize2:`<polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>`, Check:`<polyline points="20 6 9 13 4 10"/>`, Search:`<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>`, ChevronLeft:`<polyline points="15 18 9 12 15 6"/>`, ChevronRight:`<polyline points="9 18 15 12 9 6"/>`, Bell:`<path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>`, Store:`<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>`, Eye:`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>` };
const Ic = ({ n, size=16, cls="", sw=2, style={} }) => (
  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round" className={cls} style={style} dangerouslySetInnerHTML={{__html: IC[n]||''}}/>
);

/* ── ProductImg ── */
const ProductImg = ({ size="md", badge }) => {
  const cfg = { sm:[28,12], md:[40,16], lg:[48,18], xl:[56,20] };
  const [dim, iconSz] = cfg[size]||cfg.md;
  return (
    <div style={{width:dim,height:dim,borderRadius:8,background:'#e0f2fe',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,position:'relative',overflow:'visible'}}>
      {badge && <span style={{position:'absolute',top:-4,left:-4,zIndex:10,background:'#2563eb',color:'white',fontWeight:'bold',borderRadius:3,fontSize:'5px',lineHeight:1,padding:'1px 2px',whiteSpace:'nowrap'}}>{badge}</span>}
      <Ic n="Store" size={iconSz} cls="text-blue-400"/>
    </div>
  );
};

/* ── SlideToPayButton ── */
const SlideToPayButton = ({ onComplete }) => {
  const [dragging, setDragging] = useState(false);
  const [pos, setPos] = useState(0);
  const startX = useRef(0);
  const THUMB=44, TRACK_W=220, MAX=TRACK_W-THUMB;
  const onStart = cx => { setDragging(true); startX.current = cx - pos; };
  const onMove = cx => {
    if (!dragging) return;
    const next = Math.max(0, Math.min(MAX, cx - startX.current));
    setPos(next);
    if (next >= MAX-4) { setDragging(false); setPos(MAX); setTimeout(()=>{ setPos(0); onComplete(); },200); }
  };
  const onEnd = () => { if (dragging) { setDragging(false); setPos(0); } };
  return (
    <div style={{position:'relative',display:'flex',alignItems:'center',borderRadius:12,overflow:'hidden',userSelect:'none',width:TRACK_W,height:48,background:'#1a1a2e'}}
      onMouseMove={e=>onMove(e.clientX)} onMouseUp={onEnd} onMouseLeave={onEnd}
      onTouchMove={e=>onMove(e.touches[0].clientX)} onTouchEnd={onEnd}>
      <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',gap:6,pointerEvents:'none'}}>
        <span style={{fontSize:11,fontWeight:'bold',color:'#a78bfa',marginLeft:40}}>G</span>
        <span style={{fontSize:11,fontWeight:'bold',color:'white'}}>슬라이드 GripPay 결제</span>
      </div>
      <div style={{position:'absolute',top:4,bottom:4,width:THUMB,left:4+pos,background:'linear-gradient(135deg,#7c3aed,#4f46e5)',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center',cursor:'grab',zIndex:10,transition:dragging?'none':'left 0.2s'}}
        onMouseDown={e=>onStart(e.clientX)} onTouchStart={e=>onStart(e.touches[0].clientX)}>
        <Ic n="ChevronRight" size={18} cls="text-white"/>
      </div>
    </div>
  );
};

/* ── PayCompleteModal ── */
const PayCompleteModal = ({ orders, onClose }) => {
  const total = orders.reduce((s,o)=>s+o.totalPrice,0);
  const count = orders.reduce((s,o)=>s+o.quantity,0);
  const first = orders[0]||null;
  return (
    <div style={{width:'100%'}}>
      <div style={{background:'white',borderRadius:'24px 24px 0 0',padding:'24px 20px 20px',display:'flex',flexDirection:'column',alignItems:'center',boxShadow:'0 -10px 40px rgba(0,0,0,0.2)'}}>
        <div style={{width:56,height:56,borderRadius:'50%',background:'linear-gradient(135deg,#7c3aed,#4f46e5)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:12}}>
          <Ic n="Check" size={28} cls="text-white" sw={3}/>
        </div>
        <h2 style={{fontSize:15,fontWeight:900,color:'#111',marginBottom:4}}>결제가 완료되었습니다!</h2>
        <p style={{fontSize:10,color:'#9ca3af',marginBottom:16}}>GripPay로 빠르고 간편하게 구매했어요.</p>
        {first ? (
          <div style={{width:'100%',background:'#f9fafb',borderRadius:12,padding:12,display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
            <ProductImg size="md"/>
            <div style={{flexGrow:1,minWidth:0}}>
              <p style={{fontSize:10,fontWeight:'bold',color:'#374151',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{orders.length===1?first.productName:`${first.productName} 외 ${orders.length-1}개`}</p>
              {first.option && <p style={{fontSize:8,color:'#9ca3af',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{first.option}</p>}
              <p style={{fontSize:12,fontWeight:900,color:'#111',marginTop:2}}>{total.toLocaleString()}원 ({count}개)</p>
            </div>
          </div>
        ) : (
          <div style={{width:'100%',background:'#f9fafb',borderRadius:12,padding:12,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}>
            <p style={{fontSize:10,color:'#9ca3af'}}>결제가 완료되었습니다.</p>
          </div>
        )}
        <button onClick={onClose} style={{width:'100%',padding:'12px 0',borderRadius:12,fontWeight:'bold',color:'white',fontSize:14,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#7c3aed,#4f46e5)'}}>확인</button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════
   BroadcastSimulation
══════════════════════════════════ */
const BroadcastSimulation = () => {
  const [activeProductId, setActiveProductId] = useState(4);
  const [upOptionText, setUpOptionText] = useState("");
  const [currentStock, setCurrentStock] = useState(100);
  const [productStatuses, setProductStatuses] = useState({4:"판매중",1:"판매예정",2:"품절",3:"판매예정",5:"판매예정",6:"판매예정"});
  const [storeOnProducts, setStoreOnProducts] = useState({4:false,1:false,2:false,3:false,5:false,6:false});
  const [isPopupOpen, setIsPopupOpen] = useState(false);
  const [isProductListOpen, setIsProductListOpen] = useState(false);
  const [customerTab, setCustomerTab] = useState("products");
  const [selectedOption1, setSelectedOption1] = useState("");
  const [selectedColor, setSelectedColor] = useState("블랙");
  const [selectedSize, setSelectedSize] = useState("250");
  const [selectedMaterial, setSelectedMaterial] = useState("코튼");
  const [selectedPattern, setSelectedPattern] = useState("무지");
  const [selectedPackage, setSelectedPackage] = useState("일반포장");
  const [quantity, setQuantity] = useState(1);
  const [orders, setOrders] = useState([]);
  const [showOrderToast, setShowOrderToast] = useState(false);
  const [showPayComplete, setShowPayComplete] = useState(false);
  const [showPayPage, setShowPayPage] = useState(false);
  const [detailProduct, setDetailProduct] = useState(null);
  const [isSellerManagementOpen, setIsSellerManagementOpen] = useState(false);
  const [isSellerOptionPopupOpen, setIsSellerOptionPopupOpen] = useState(false);
  const [sellerTargetProductId, setSellerTargetProductId] = useState(null);
  const [sellerSelectedOptionIdx, setSellerSelectedOptionIdx] = useState(0);

  const products = [
    {id:4,name:"옵션 없는 상품",price:15000,depth:0,options:[{name:"단일 상품",stock:100}]},
    {id:1,name:"1단계 옵션 상품",price:22000,depth:1,options:[{name:"고구마맛탕 (40개)",stock:20},{name:"깻잎맛탕 (40개)",stock:0},{name:"새우맛탕 (20개)",stock:25}]},
    {id:2,name:"2단계 옵션 상품",price:23000,depth:2,colors:["블랙","화이트","베이지"],sizes:["230","240","250"]},
    {id:3,name:"3단계 옵션 상품",price:25000,depth:3,colors:["레이지","브라운"],sizes:["S","M"],materials:["코튼","린넨"]},
    {id:5,name:"4단계 옵션 상품",price:28000,depth:4,colors:["네이비","그레이"],sizes:["95","100"],materials:["화리","울"],patterns:["무지","스트라이프"]},
    {id:6,name:"5단계 옵션 상품",price:32000,depth:5,colors:["레드","블루"],sizes:["FREE"],materials:["캐시미어"],patterns:["체크"],packages:["일반포장","선물포장"]},
  ];

  const generateOptions = (productId) => {
    const prod = products.find(p=>p.id===productId);
    if (!prod) return [];
    let raw = [];
    if (prod.depth===0||prod.depth===1) raw=[...prod.options];
    else if (prod.depth===2) prod.colors.forEach(c=>prod.sizes.forEach(s=>raw.push({name:`${c} / ${s}`,stock:(c==="화이트"&&s==="240")?0:15,color:c,size:s})));
    else if (prod.depth===3) prod.colors.forEach(c=>prod.sizes.forEach(s=>prod.materials.forEach(m=>raw.push({name:`${c} / ${s} / ${m}`,stock:10,color:c,size:s,material:m}))));
    else if (prod.depth===4) prod.colors.forEach(c=>prod.sizes.forEach(s=>prod.materials.forEach(m=>prod.patterns.forEach(p=>raw.push({name:`${c} / ${s} / ${m} / ${p}`,stock:8,color:c,size:s,material:m,pattern:p})))));
    else if (prod.depth===5) prod.colors.forEach(c=>prod.sizes.forEach(s=>prod.materials.forEach(m=>prod.patterns.forEach(p=>prod.packages.forEach(pkg=>raw.push({name:`${c} / ${s} / ${m} / ${p} / ${pkg}`,stock:5,color:c,size:s,material:m,pattern:p,package:pkg}))))));
    return raw.sort((a,b)=>(a.stock<1&&b.stock>=1)?1:(a.stock>=1&&b.stock<1)?-1:0);
  };

  const currentSellerOptions = useMemo(()=>generateOptions(sellerTargetProductId),[sellerTargetProductId]);
  const activeProduct = products.find(p=>p.id===activeProductId);
  const totalPrice = activeProduct ? activeProduct.price*quantity : 0;

  const getOptionLabel = (prod) => {
    if (!prod) return "";
    if (prod.depth===0) return prod.name;
    if (prod.depth===1) return selectedOption1;
    if (prod.depth===2) return `${selectedColor} / ${selectedSize}`;
    if (prod.depth===3) return `${selectedColor} / ${selectedSize} / ${selectedMaterial}`;
    if (prod.depth===4) return `${selectedColor} / ${selectedSize} / ${selectedMaterial} / ${selectedPattern}`;
    if (prod.depth===5) return `${selectedColor} / ${selectedSize} / ${selectedMaterial} / ${selectedPattern} / ${selectedPackage}`;
    return "";
  };

  const handlePurchaseByCustomer = (id) => {
    const prod = products.find(p=>p.id===id);
    setActiveProductId(id); setQuantity(1);
    const opts = generateOptions(id);
    const first = opts.find(o=>o.stock>0)||opts[0];
    setUpOptionText(prod.depth===0?"":first.name);
    setCurrentStock(first.stock);
    if (prod.depth===1) setSelectedOption1(opts.find(o=>o.stock>0)?.name||"");
    else if (prod.depth>=2) {
      setSelectedColor(first.color||prod.colors?.[0]||"");
      setSelectedSize(first.size||prod.sizes?.[0]||"");
      if (prod.depth>=3) setSelectedMaterial(first.material||prod.materials?.[0]||"");
      if (prod.depth>=4) setSelectedPattern(first.pattern||prod.patterns?.[0]||"");
      if (prod.depth>=5) setSelectedPackage(first.package||prod.packages?.[0]||"");
    }
    setIsProductListOpen(false); setIsPopupOpen(true);
  };

  const handleOrder = () => {
    if (!activeProduct) return;
    const newOrder = {
      id:Date.now(), productId:activeProduct.id, productName:activeProduct.name,
      option:activeProduct.depth===0?"":getOptionLabel(activeProduct),
      quantity, price:activeProduct.price, totalPrice:activeProduct.price*quantity,
      orderedAt:new Date().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"}),
      badge:"한정판매", hasCoupon:false,
    };
    setOrders(prev=>[newOrder,...prev]);
    setIsPopupOpen(false); setShowOrderToast(true);
    setTimeout(()=>{ setShowOrderToast(false); setCustomerTab("order"); setIsProductListOpen(true); },800);
  };

  const updateOrderQty = (id,d) => setOrders(prev=>prev.map(o=>o.id===id?{...o,quantity:Math.max(1,o.quantity+d),totalPrice:o.price*Math.max(1,o.quantity+d)}:o));
  const removeOrder = (id) => setOrders(prev=>prev.filter(o=>o.id!==id));

  const openSellerOptionPopup = (id) => {
    const prod = products.find(p=>p.id===id);
    if (prod.depth===0) { setActiveProductId(id); setUpOptionText(""); setQuantity(1); setCurrentStock(prod.options[0].stock); return; }
    const opts = generateOptions(id);
    const maxIdx = opts.reduce((mi,c,i,a)=>(c.stock>a[mi].stock?i:mi),0);
    setSellerTargetProductId(id); setSellerSelectedOptionIdx(maxIdx); setIsSellerOptionPopupOpen(true);
  };

  const handleSellerUpExecute = () => {
    const combo = currentSellerOptions[sellerSelectedOptionIdx];
    setActiveProductId(sellerTargetProductId); setQuantity(1);
    setUpOptionText(combo.name); setCurrentStock(combo.stock);
    const prod = products.find(p=>p.id===sellerTargetProductId);
    if (prod.depth===1) setSelectedOption1(combo.name);
    else {
      if (combo.color) setSelectedColor(combo.color);
      if (combo.size) setSelectedSize(combo.size);
      if (combo.material) setSelectedMaterial(combo.material);
      if (combo.pattern) setSelectedPattern(combo.pattern);
      if (combo.package) setSelectedPackage(combo.package);
    }
    setIsSellerOptionPopupOpen(false);
  };

  const handleDown = (id) => { if (activeProductId===id) { setActiveProductId(null); setUpOptionText(""); } };
  const updateStatus = (id,s) => setProductStatuses(prev=>({...prev,[id]:s}));
  const toggleStoreOn = (id) => setStoreOnProducts(prev=>({...prev,[id]:!prev[id]}));
  const visibleCustomerProducts = products.filter(p=>storeOnProducts[p.id]);

  const orderSubtotal = orders.reduce((s,o)=>s+o.totalPrice,0);
  const couponDiscount = 2000;
  const shippingFee = orders.length>0?3000:0;
  const orderTotal = orderSubtotal - couponDiscount + shippingFee;

  const mobileStyle = {width:280,height:580,position:'relative',background:'#000',borderRadius:44,boxShadow:'0 25px 50px rgba(0,0,0,0.5)',overflow:'hidden',border:'12px solid #1f2937'};

  /* ─ 옵션 선택 버튼 공통 ─ */
  const OptBtn = ({val,selected,onClick,disabled}) => (
    <button onClick={()=>!disabled&&onClick(val)} style={{padding:'4px 8px',borderRadius:6,fontSize:9,fontWeight:600,border:`1px solid ${disabled?'#e5e7eb':selected?'#6366f1':'#e5e7eb'}`,color:disabled?'#d1d5db':selected?'#4f46e5':'#374151',background:selected?'#eef2ff':disabled?'#f9fafb':'white',cursor:disabled?'not-allowed':'pointer'}}>{val}</button>
  );

  return (
    <div style={{padding:16,background:'#f3f4f6',minHeight:'calc(100vh - 60px)'}}>
      <div style={{textAlign:'center',marginBottom:16}}>
        <h2 style={{fontSize:18,fontWeight:'bold',color:'#1f2937',marginBottom:4}}>📺 라이브 방송 시뮬레이션</h2>
        <p style={{color:'#6b7280',fontSize:12}}>고객 화면과 셀러 화면을 동시에 확인</p>
      </div>
      <div style={{display:'flex',gap:24,justifyContent:'center',alignItems:'flex-start',flexWrap:'wrap'}}>

        {/* ── 고객뷰 ── */}
        <div style={{display:'flex',flexDirection:'column',alignItems:'center'}}>
          <div style={{marginBottom:8,display:'inline-flex',alignItems:'center',gap:6,background:'#dcfce7',color:'#15803d',padding:'4px 12px',borderRadius:999,fontSize:12,fontWeight:'bold'}}>
            <Ic n="Eye" size={12}/> 고객뷰
          </div>
          <div style={mobileStyle}>
            {/* status bar */}
            <div style={{position:'absolute',top:0,width:'100%',height:32,display:'flex',justifyContent:'space-between',alignItems:'center',padding:'0 20px',zIndex:20,color:'white',fontSize:10}}>
              <span>8:06</span><div style={{opacity:.5}}>|||</div>
            </div>
            {/* bg */}
            <div style={{position:'absolute',inset:0,background:'linear-gradient(135deg,#581c87,#111827,#000)'}}>
              <div style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:60,opacity:.3}}>🎪</div>
            </div>
            {/* host */}
            <div style={{position:'absolute',top:36,left:0,width:'100%',padding:'0 12px',zIndex:10,display:'flex',justifyContent:'space-between',alignItems:'flex-start',color:'white'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:32,height:32,borderRadius:'50%',border:'2px solid #ec4899',background:'linear-gradient(135deg,#f472b6,#ef4444)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>👩</div>
                <div><div style={{fontWeight:'bold',fontSize:11}}>꽃꽃언니 🎀</div><div style={{fontSize:9,opacity:.8}}>❤️ 5만  🔥 723</div></div>
              </div>
              <div style={{display:'flex',gap:8}}><Ic n="Share2" size={14}/><Ic n="X" size={14}/></div>
            </div>

            {/* order toast */}
            {showOrderToast && (
              <div style={{position:'absolute',bottom:80,left:0,width:'100%',padding:'0 12px',zIndex:20}}>
                <div style={{background:'white',borderRadius:12,boxShadow:'0 10px 25px rgba(0,0,0,0.15)',border:'1px solid #f3f4f6',padding:'10px 12px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:8}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <div style={{width:28,height:28,background:'#e0f2fe',borderRadius:8,display:'flex',alignItems:'center',justifyContent:'center'}}><Ic n="Store" size={13} cls="text-blue-400"/></div>
                    <p style={{fontSize:10,color:'#374151'}}>라이브 주문서에 상품이 담겼습니다.</p>
                  </div>
                  <button onClick={()=>{setShowOrderToast(false);setCustomerTab("order");setIsProductListOpen(true);}}
                    style={{border:'1px dashed #f472b6',color:'#ec4899',fontSize:9,fontWeight:'bold',padding:'4px 8px',borderRadius:8,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:2,background:'none',cursor:'pointer'}}>
                    바로가기 <Ic n="ChevronRight" size={10}/>
                  </button>
                </div>
              </div>
            )}

            {/* active product banner */}
            {activeProduct && (()=>{

                        <div key={idx} onClick={()=>!soldOut&&setSellerSelectedOptionIdx(idx)}
                          style={{padding:8,borderRadius:8,border:`2px solid ${soldOut?'#f3f4f6':sellerSelectedOptionIdx===idx?'#ef4444':'#f3f4f6'}`,display:'flex',justifyContent:'space-between',alignItems:'center',cursor:soldOut?'not-allowed':'pointer',background:soldOut?'#f9fafb':sellerSelectedOptionIdx===idx?'#fef2f2':'white',opacity:soldOut?.5:1}}>
                          <div>
                            <p style={{fontWeight:'bold',fontSize:10,color:sellerSelectedOptionIdx===idx&&!soldOut?'#ef4444':'#1f2937'}}>{opt.name} {soldOut?"(품절)":""}</p>
                            <p style={{fontSize:8,color:opt.stock<=5&&!soldOut?'#ef4444':'#9ca3af'}}>재고: {opt.stock}개</p>
                          </div>
                          {!soldOut&&(
                            <div style={{width:16,height:16,borderRadius:'50%',border:`2px solid ${sellerSelectedOptionIdx===idx?'#ef4444':'#d1d5db'}`,display:'flex',alignItems:'center',justifyContent:'center',background:sellerSelectedOptionIdx===idx?'#ef4444':'white'}}>
                              {sellerSelectedOptionIdx===idx&&<Ic n="Check" size={10} cls="text-white" sw={3}/>}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{padding:12,display:'flex',gap:8,borderTop:'1px solid #e5e7eb',flexShrink:0}}>
                    <button onClick={()=>setIsSellerOptionPopupOpen(false)} style={{padding:'8px 12px',borderRadius:8,background:'#f3f4f6',fontWeight:'bold',color:'#9ca3af',fontSize:9,border:'none',cursor:'pointer'}}>닫기</button>
                    <button onClick={handleSellerUpExecute} style={{flex:1,padding:12,borderRadius:8,background:'#ef4444',color:'white',fontWeight:'bold',fontSize:14,border:'none',cursor:'pointer'}}>UP 하기</button>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};
